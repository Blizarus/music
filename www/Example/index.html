<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <a href="#">Музыкальный сервис</a>
    </header>
    <main class="main">
        <div class="container">
            <section class="settings">
                <nav class="settings__nav">
                    <span class="settings__text">Навигация</span>
                    <ul class="settings__list">
                        <li class="settings__list-item">
                            <img src="image/mainpage.svg" alt="ИконкаДома">
                            <a href="#" class="settings__link">
                                Главная
                            </a>
                        </li>
                        <li class="settings__list-item">
                            <img src="image/ticket.svg" alt="ИконкаДома">
                            <a href="#" class="settings__link">
                                Исполнители
                            </a>
                        </li>
                        <li class="settings__list-item">
                            <img src="image/folder.svg" alt="ИконкаДома">
                            <a href="#" class="settings__link">
                                Альбомы
                            </a>
                        </li>
                        <li class="settings__list-item">
                            <img src="image/computer.svg" alt="ИконкаДома">
                            <a href="#" class="settings__link">
                                Жанры
                            </a>
                        </li>
                        <li class="settings__list-item">
                            <img src="image/playback.svg" alt="ИконкаДома">
                            <a href="#" class="settings__link">
                                Все композиции
                            </a>
                        </li>
                        <li class="settings__list-item">
                            <img src="image/analize.svg" alt="ИконкаДома">
                            <a href="#" class="settings__link">
                                Анализ песни
                            </a>
                        </li>
                    </ul>
                    <span class="settings__text">Настройки</span>
                    <ul class="settings__list">
                        <li class="settings__list-item">
                            <img src="image/person.svg" alt="ИконкаДома">
                            <a href="#" class="settings__link">
                                Настройки профиля
                            </a>
                        </li>
                    </ul>
                    <!-- <span class="settings__text">Настройки вида приложения</span>
                    <ul class="settings__list">
                        <li class="settings__list-item">
                            <div class="settings__link">
                                Ночной режим
                            </div>
                            <button>///</button>
                        </li>
                    </ul> -->
                </nav>
            </section>
            <section class="content">
                <div class="content-head">
                    <input class="content-head__input" type="text" value="Поиск">
                    <button class="content-head__button">
                        <img class="content-head__image" src="image/close.svg" alt="">
                    </button>
                    <button class="content-head__button">
                        <img class="content-head__image update" src="image/update.png" alt="">
                    </button>
                </div>
                <div class="content-main">
                    <div class="content-music">
                        <div class="content-wrapper">
                            <img class="content-wrapper__image" src="image/AceOfBase.jpeg" alt="">
                            <div class="content-wrapper__info">
                                <h3 class="content-wrapper__text">Ace Of Base</h3>
                                <ul class="content-wrapper__list">
                                    <li class="content-wrapper__list-item">
                                        Жанр: Поп
                                    </li>
                                    <li class="content-wrapper__list-item">
                                        Год основания: 1990
                                    </li>
                                    <li class="content-wrapper__list-item">
                                        Число прослушиваний: 0
                                    </li>
                                </ul>
                                <button class="content-wrapper__buttons">Показатель все характеристики</button>
                            </div>
                        </div>
                        <div class="content-wrapper">
                            <img class="content-wrapper__image" src="image/anikv.jpeg" alt="">
                            <div class="content-wrapper__info">
                                <h3 class="content-wrapper__text">Anikv</h3>
                                <ul class="content-wrapper__list">
                                    <li class="content-wrapper__list-item">
                                        Жанр: RnB
                                    </li>
                                    <li class="content-wrapper__list-item">
                                        Год основания: 2018
                                    </li>
                                    <li class="content-wrapper__list-item">
                                        Число прослушиваний: 1
                                    </li>
                                </ul>
                                <button class="content-wrapper__buttons">Показатель все характеристики</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
